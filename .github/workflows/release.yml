name: Release

# Build the Windows binary and attach it to a GitHub release.
# Trigger by pushing a `v*` tag (e.g. `git tag v0.1.0 && git push --tags`),
# or run manually via the "Run workflow" button on Actions tab.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed to upload artifacts to a release

jobs:
  build-windows:
    name: Build windows-amd64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build (windows/amd64)
        working-directory: image-studio
        shell: bash
        run: wails build -platform windows/amd64 -clean

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp image-studio/build/bin/image-studio.exe dist/image-studio-windows-amd64.exe
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-studio-windows-amd64.exe
          path: dist/image-studio-windows-amd64.exe
          retention-days: 14

      - name: Attach to release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/image-studio-windows-amd64.exe
          fail_on_unmatched_files: true
          generate_release_notes: false
